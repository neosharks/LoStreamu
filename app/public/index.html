<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #15171c;
    --panel-2: #1b1e25;
    --line: #24272f;
    --text: #e9eaed;
    --muted: #8a8f9a;
    --accent: #f0b429;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: rgba(12,13,16,.85);
    backdrop-filter: blur(8px); z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--accent);
    display: grid; place-items: center; color: #1a1300; }
  .mark svg { width: 15px; height: 15px; }
  .brand h1 { font-size: 1.05rem; font-weight: 650; letter-spacing: -0.01em; }
  .actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 14px; font-size: 0.82rem; cursor: pointer; transition: .15s;
  }
  .btn:hover { border-color: #383c46; }
  .count { color: var(--muted); font-size: 0.8rem; }

  main { padding: 28px; max-width: 1400px; margin: 0 auto; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .card:hover { transform: translateY(-3px); border-color: #3a3f4a; }
  .thumb {
    aspect-ratio: 16/9; background: #0e0f13 center/cover no-repeat;
    position: relative; display: grid; place-items: center;
  }
  .thumb .ph { color: #3a3f4a; }
  .thumb .ph svg { width: 36px; height: 36px; }
  .card:hover .play {
    opacity: 1;
  }
  .play {
    position: absolute; inset: 0; display: grid; place-items: center;
    background: rgba(0,0,0,.35); opacity: 0; transition: opacity .15s;
  }
  .play div { width: 48px; height: 48px; border-radius: 50%; background: var(--accent);
    display: grid; place-items: center; color: #1a1300; }
  .play svg { width: 20px; height: 20px; margin-left: 2px; }
  .meta { padding: 12px 14px; }
  .meta .name { font-size: 0.9rem; font-weight: 550; line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .empty { color: var(--muted); text-align: center; padding: 80px 20px; }
  .empty code { background: var(--panel-2); padding: 2px 7px; border-radius: 5px; color: var(--accent); }

  /* Player overlay */
  .player { position: fixed; inset: 0; background: #000; z-index: 50; display: none; }
  .player.open { display: block; }
  .player video { width: 100%; height: 100%; object-fit: contain; background: #000; }

  .pbar { position: absolute; left: 0; right: 0; bottom: 0;
    padding: 18px 24px 22px; opacity: 0; transition: opacity .2s;
    background: linear-gradient(transparent, rgba(0,0,0,.75)); }
  .player.show-ui .pbar, .player.paused .pbar { opacity: 1; }
  .ptop { position: absolute; top: 0; left: 0; right: 0; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    opacity: 0; transition: opacity .2s;
    background: linear-gradient(rgba(0,0,0,.7), transparent); }
  .player.show-ui .ptop, .player.paused .ptop { opacity: 1; }
  .ptitle { font-size: 0.95rem; font-weight: 550; max-width: 70%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .iconbtn { background: rgba(255,255,255,.08); border: none; color: var(--text);
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    display: grid; place-items: center; transition: background .15s; }
  .iconbtn:hover { background: rgba(255,255,255,.18); }
  .iconbtn svg { width: 20px; height: 20px; }
  .iconbtn.skip { width: auto; padding: 0 12px; gap: 4px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
  .iconbtn.skip svg { width: 17px; height: 17px; }
  .big { width: 56px; height: 56px; background: var(--accent); color: #1a1300; }
  .big:hover { background: var(--accent); filter: brightness(1.08); }
  .big svg { width: 26px; height: 26px; }

  .controls { display: flex; align-items: center; gap: 16px; margin-top: 12px; }
  .time { font-size: 0.78rem; color: #cfd2d8; font-variant-numeric: tabular-nums; min-width: 92px; }
  .seek { flex: 1; height: 5px; background: rgba(255,255,255,.2); border-radius: 3px;
    position: relative; cursor: pointer; }
  .seek .buf { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,.25); border-radius: 3px; }
  .seek .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 3px; width: 0; }
  .seek .knob { position: absolute; top: 50%; width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); transform: translate(-50%, -50%); left: 0; }
  .center-row { display: flex; align-items: center; justify-content: center; gap: 28px;
    position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
    pointer-events: none; opacity: 0; transition: opacity .2s; }
  .player.show-ui .center-row, .player.paused .center-row { opacity: 1; }
  .center-row .iconbtn { pointer-events: auto; }

  /* Add-videos button + download panel */
  .btn-primary { background: var(--accent); color: #1a1300; border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { filter: brightness(1.07); border-color: var(--accent); }

  .dl-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 440px; max-width: 100vw;
    background: var(--panel); border-left: 1px solid var(--line);
    transform: translateX(100%); transition: transform .22s ease; z-index: 40;
    display: flex; flex-direction: column;
  }
  .dl-panel.open { transform: translateX(0); }
  .dl-inner { padding: 22px 22px 28px; overflow-y: auto; }
  .dl-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .dl-head h2 { font-size: 1.05rem; font-weight: 650; }
  .dl-hint { color: var(--muted); font-size: 0.82rem; line-height: 1.5; margin: 8px 0 18px; }
  .dl-input-row { display: flex; gap: 8px; }
  .dl-input-row input {
    flex: 1; background: #0e0f13; border: 1px solid var(--line); border-radius: 9px;
    color: var(--text); padding: 10px 12px; font-size: 0.88rem; min-width: 0;
  }
  .dl-input-row input:focus { outline: none; border-color: var(--accent); }
  .dl-input-row .btn { white-space: nowrap; }
  .dl-err { color: #ff9b9e; font-size: 0.8rem; margin-top: 10px; display: none; }

  .dl-list { margin-top: 22px; display: flex; flex-direction: column; gap: 12px; }
  .dl-item { background: var(--panel-2); border: 1px solid var(--line); border-radius: 11px; padding: 13px 14px; }
  .dl-item .row1 { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .dl-item .stat { font-size: 0.84rem; font-weight: 550; }
  .dl-item .stat.done { color: var(--accent); }
  .dl-item .stat.error { color: #ff9b9e; }
  .dl-item .x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 4px 6px; border-radius: 6px; }
  .dl-item .x:hover { color: var(--text); background: rgba(255,255,255,.06); }
  .dl-bar { height: 6px; background: rgba(255,255,255,.1); border-radius: 4px; margin: 10px 0 7px; overflow: hidden; }
  .dl-bar .fill { height: 100%; background: var(--accent); width: 0; transition: width .25s; border-radius: 4px; }
  .dl-bar.indet .fill { width: 40%; animation: indet 1.1s ease-in-out infinite; }
  @keyframes indet { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
  .dl-sub { display: flex; gap: 14px; color: var(--muted); font-size: 0.74rem; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
      <h1>StreamVault</h1>
    </div>
    <div class="actions">
      <span class="count" id="count"></span>
      <button class="btn btn-primary" id="addVideos">+ Add videos</button>
      <button class="btn" id="rescan">Rescan</button>
      <button class="btn" id="logout">Sign out</button>
    </div>
  </header>

  <!-- Add videos / download panel -->
  <div class="dl-panel" id="dlPanel">
    <div class="dl-inner">
      <div class="dl-head">
        <h2>Add videos</h2>
        <button class="iconbtn" id="dlClose" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <p class="dl-hint">Paste a video link — direct file, m3u8/HLS stream, or any site yt-dlp supports. Each download is saved under a random name.</p>
      <div class="dl-input-row">
        <input id="dlUrl" type="url" placeholder="https://server.example.com/videos/stream/master.m3u8?token=…">
        <button class="btn btn-primary" id="dlStart">Download</button>
      </div>
      <div class="dl-err" id="dlErr"></div>
      <div class="dl-list" id="dlList"></div>
    </div>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      No videos yet. Drop files into your media folder and press <strong>Rescan</strong>.
    </div>
  </main>

  <div class="player" id="player">
    <video id="video" playsinline></video>

    <div class="ptop">
      <span class="ptitle" id="ptitle"></span>
      <button class="iconbtn" id="close" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="center-row">
      <button class="iconbtn skip" id="back10" title="Back 10s">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L4 12l7 7M4 12h11a5 5 0 1 1 0 10h-1"/></svg>10
      </button>
      <button class="iconbtn big" id="bigplay">
        <svg id="bigicon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="iconbtn skip" id="fwd10" title="Forward 10s">10
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l7 7-7 7M20 12H9a5 5 0 1 0 0 10h1"/></svg>
      </button>
    </div>

    <div class="pbar">
      <div class="seek" id="seek">
        <div class="buf" id="buf"></div>
        <div class="fill" id="fill"></div>
        <div class="knob" id="knob"></div>
      </div>
      <div class="controls">
        <button class="iconbtn" id="play2">
          <svg id="play2icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="time" id="time">0:00 / 0:00</span>
        <button class="iconbtn" id="next" title="Next video">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v14l9-7zM16 5h2v14h-2z"/></svg>
        </button>
        <button class="iconbtn" id="full" title="Fullscreen" style="margin-left:auto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
        </button>
      </div>
    </div>
  </div>

<script>
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const countEl = document.getElementById('count');
let videos = [];
let current = -1;

const PLAY = '<path d="M8 5v14l11-7z"/>';
const PAUSE = '<path d="M7 5h3v14H7zM14 5h3v14h-3z"/>';

async function load() {
  const r = await fetch('/api/videos');
  if (r.status === 401) { location.href = '/login'; return; }
  videos = await r.json();
  render();
}

function render() {
  countEl.textContent = videos.length ? videos.length + ' videos' : '';
  grid.innerHTML = '';
  empty.style.display = videos.length ? 'none' : 'block';
  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="thumb" style="background-image:url('/thumb/${v.id}')">
        <div class="ph"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v16H4zM9 9l6 3-6 3z"/></svg></div>
        <div class="play"><div><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div></div>
      </div>
      <div class="meta"><div class="name">${escapeHtml(v.name)}</div></div>`;
    // Hide placeholder once the real thumb loads
    const img = new Image();
    img.onload = () => { const ph = card.querySelector('.ph'); if (ph) ph.style.display = 'none'; };
    img.src = '/thumb/' + v.id;
    card.addEventListener('click', () => playIndex(i));
    grid.appendChild(card);
  });
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ---- Player ----
const player = document.getElementById('player');
const video = document.getElementById('video');
const ptitle = document.getElementById('ptitle');
const fill = document.getElementById('fill');
const buf = document.getElementById('buf');
const knob = document.getElementById('knob');
const timeEl = document.getElementById('time');
const seek = document.getElementById('seek');
const bigicon = document.getElementById('bigicon');
const play2icon = document.getElementById('play2icon');

function playIndex(i) {
  current = i;
  const v = videos[i];
  ptitle.textContent = v.name;
  video.src = '/stream/' + v.id;
  player.classList.add('open');
  video.play().catch(()=>{});
  flashUI();
}

function togglePlay() { video.paused ? video.play() : video.pause(); }
function setIcons() {
  const g = video.paused ? PLAY : PAUSE;
  bigicon.innerHTML = g; play2icon.innerHTML = g;
  player.classList.toggle('paused', video.paused);
}
video.addEventListener('play', setIcons);
video.addEventListener('pause', setIcons);

function fmt(t) {
  if (!isFinite(t)) return '0:00';
  t = Math.floor(t);
  const h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = t%60;
  return (h ? h + ':' + String(m).padStart(2,'0') : m) + ':' + String(s).padStart(2,'0');
}
video.addEventListener('timeupdate', () => {
  const p = video.duration ? (video.currentTime / video.duration) * 100 : 0;
  fill.style.width = p + '%';
  knob.style.left = p + '%';
  timeEl.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
});
video.addEventListener('progress', () => {
  if (video.buffered.length && video.duration) {
    buf.style.width = (video.buffered.end(video.buffered.length-1) / video.duration) * 100 + '%';
  }
});

function seekTo(e) {
  const rect = seek.getBoundingClientRect();
  const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  if (video.duration) video.currentTime = ratio * video.duration;
}
let dragging = false;
seek.addEventListener('mousedown', e => { dragging = true; seekTo(e); });
window.addEventListener('mousemove', e => { if (dragging) seekTo(e); });
window.addEventListener('mouseup', () => dragging = false);

document.getElementById('bigplay').addEventListener('click', togglePlay);
document.getElementById('play2').addEventListener('click', togglePlay);
video.addEventListener('click', togglePlay);
document.getElementById('back10').addEventListener('click', () => video.currentTime -= 10);
document.getElementById('fwd10').addEventListener('click', () => video.currentTime += 10);
document.getElementById('next').addEventListener('click', playNext);
function playNext() {
  if (current + 1 < videos.length) playIndex(current + 1);
  else closePlayer();
}
video.addEventListener('ended', playNext);

document.getElementById('full').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else player.requestFullscreen().catch(()=>{});
});

function closePlayer() {
  player.classList.remove('open');
  video.pause(); video.removeAttribute('src'); video.load();
}
document.getElementById('close').addEventListener('click', closePlayer);

// Auto-hide UI on inactivity
let hideTimer;
function flashUI() {
  player.classList.add('show-ui');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => player.classList.remove('show-ui'), 2600);
}
player.addEventListener('mousemove', flashUI);
player.addEventListener('click', flashUI);

// Keyboard
window.addEventListener('keydown', e => {
  if (!player.classList.contains('open')) return;
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowLeft') video.currentTime -= 10;
  else if (e.key === 'ArrowRight') video.currentTime += 10;
  else if (e.key === 'Escape' && !document.fullscreenElement) closePlayer();
  else if (e.key === 'n') playNext();
  flashUI();
});

// Header actions
document.getElementById('rescan').addEventListener('click', async () => {
  await fetch('/api/rescan', { method: 'POST' });
  load();
});
document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login';
});

// ---- Add videos / downloads ----
const dlPanel = document.getElementById('dlPanel');
const dlList = document.getElementById('dlList');
const dlUrl = document.getElementById('dlUrl');
const dlErr = document.getElementById('dlErr');
const liveStreams = {}; // jobId -> EventSource

function openPanel() { dlPanel.classList.add('open'); dlUrl.focus(); refreshDownloads(); }
function closePanel() { dlPanel.classList.remove('open'); }
document.getElementById('addVideos').addEventListener('click', openPanel);
document.getElementById('dlClose').addEventListener('click', closePanel);

async function startDownload() {
  dlErr.style.display = 'none';
  const url = dlUrl.value.trim();
  if (!url) return;
  const r = await fetch('/api/download', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url })
  });
  const d = await r.json().catch(() => ({}));
  if (!r.ok) { dlErr.textContent = d.error || 'Could not start download.'; dlErr.style.display = 'block'; return; }
  dlUrl.value = '';
  upsertItem(d);
  subscribe(d.id);
}
document.getElementById('dlStart').addEventListener('click', startDownload);
dlUrl.addEventListener('keydown', e => { if (e.key === 'Enter') startDownload(); });

async function refreshDownloads() {
  const r = await fetch('/api/downloads');
  if (!r.ok) return;
  const jobs = await r.json();
  jobs.forEach(j => { upsertItem(j); if (['downloading','processing','starting'].includes(j.status)) subscribe(j.id); });
}

function subscribe(id) {
  if (liveStreams[id]) return;
  const es = new EventSource('/api/download/' + id + '/events');
  liveStreams[id] = es;
  es.onmessage = (ev) => {
    const j = JSON.parse(ev.data);
    upsertItem(j);
    if (['done', 'error', 'cancelled'].includes(j.status)) {
      es.close(); delete liveStreams[id];
      if (j.status === 'done') load(); // refresh grid with the new video
    }
  };
  es.onerror = () => { es.close(); delete liveStreams[id]; };
}

function upsertItem(j) {
  let el = document.getElementById('dl-' + j.id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'dl-item';
    el.id = 'dl-' + j.id;
    dlList.prepend(el);
  }
  const active = ['starting', 'downloading', 'processing'].includes(j.status);
  const indet = j.status === 'processing' || j.status === 'starting';
  const statClass = j.status === 'done' ? 'done' : (j.status === 'error' ? 'error' : '');
  const pct = Math.max(0, Math.min(100, j.percent || 0));
  const sub = [];
  if (active && j.speed) sub.push(j.speed);
  if (active && j.eta) sub.push('ETA ' + j.eta);
  el.innerHTML = `
    <div class="row1">
      <span class="stat ${statClass}">${escapeHtml(j.message || j.status)}</span>
      <button class="x">${active ? 'Cancel' : 'Dismiss'}</button>
    </div>
    <div class="dl-bar ${indet ? 'indet' : ''}"><div class="fill" style="width:${indet ? 0 : pct}%"></div></div>
    <div class="dl-sub"><span>${active ? pct.toFixed(1) + '%' : ''}</span><span>${sub.join(' · ')}</span></div>`;
  el.querySelector('.x').addEventListener('click', async () => {
    if (active) {
      await fetch('/api/download/' + j.id + '/cancel', { method: 'POST' });
    } else {
      await fetch('/api/download/' + j.id + '/dismiss', { method: 'POST' });
      el.remove();
    }
  });
}

load();
</script>
</body>
</html>
